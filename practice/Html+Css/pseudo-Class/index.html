<html>

         <form>

			  <br>

			  <br>

			  <br>

			  <br>

			  <br>

			  <br>
			  <input class="b2"  type="button" value="reset"/>
			  <br>
			  <br>
			  <input class="b3"  type="button" value="register"/>

			  <br>
			  <label> range</label><br>
			  <input class="r1" type="range"/>
		 </form>
   </body>
</html>
