<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
	    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <title>Display Property</title>
        <style>
            body {
                height:1200px;
            }
            .flexcontainer{
                display:flex;
                /*flex-flow:column wrap;*/
                /* flex-direction:column;
                flex-wrap:wrap;*/
                height:400px;
                gap:10px;
                /* margin: 10px; */
                border:6px solid black; 
                flex-direction:row;
                /*justify-content: space-between;*/
                 justify-content:space-evenly;
                /*align-items: center; */
            }
            .flexitem{
               font-size:1.5rem;
               padding:1rem;
               text-align:center;
            }
            .item1{background-color:red ;}
            .item2{background-color:blue ;}
            .item3{background-color:green ;}
            .item4{background-color:violet ;}
            .item5{background-color:orange ;}
            .item6{background-color:crimson ;}
            .item7{background-color:slategray ;}
            .item8{background-color:pink ;}
            .item9{background-color:yellow ;}
            .item10{background-color:brown ;}
        </style>
	    <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <div class="flexcontainer">
        <div class="flexitem item1">1</div>
        <div class="flexitem item2">2</div>
        <div class="flexitem item3">3</div>
        <div class="flexitem item4">4</div>
        <div class="flexitem item5">5</div>
        <div class="flexitem item6">6</div>
        <div class="flexitem item7">7</div>
        <div class="flexitem item8">8</div>
        <div class="flexitem item9">9</div>
        <div class="flexitem item10">10</div>
        </div>
    </body>
</html>
