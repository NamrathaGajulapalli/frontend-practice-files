<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
	    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <title>align-self(ex:prize)</title>
        <style>
            body {
				text-align:center;
            }
            .container{
                display:flex;
				border:3px solid black;
				text-align:center;
				justify-content:center;
				align-items:center;
				
            }
            .common{
			   color:white;
               font-size:1.5rem;
               padding:10px;
               text-align:center;
			   border:1px solid black;
			   
	
			   
            }
            .home{
			   background-color:#eee ;
			   color:black;
			   align-self:baseline;	
			 }
			 .about{
			   background-color:#eee;
			   color:black;
			   align-self:baseline;
			  /* height:50px;*/
			   padding:20px;			   
			 }
			 .logout{
			   background-color:#eee;
			   color:black;
               align-self:baseline;			   
			 }
			 
 
        </style>
	    <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <div class="container">
		<div class="home common">camera<p>prize:12,000/-</p></div>
		<div class="about common">Mobile<p>prize:43,000/-</p></div>
		<div class="logout common">Dress<p>prize:8,00/-</p></div>
		

        </div>
    </body>
</html>
