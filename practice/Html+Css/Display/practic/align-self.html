<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
	    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <title>align-self</title>
        <style>
            body {
                height:1200px;
            }
            .container{
                display:flex;
				border:6px solid black;
				height:400px;
				
            }
            .common{
			   color:white;
               font-size:1.5rem;
               padding:10px;
               text-align:center;
	
			   
            }
            .home{
			   background-color:blue ;
			   color:white;
			   align-self:baseline;	
			 }
			 .logout{
			   background-color:violet;
			   color:white;  
               align-self:baseline;			   
			 }
			 .about{
			   background-color:red;
			   color:white; 
			   align-self:baseline;
			   height:50px;
			   padding:20px;			   
			 }
 
        </style>
	    <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <div class="container">
		<div class="home common">Home</div>
		<div class="logout common">Logout</div>
		<div class="about common">About</div>

        </div>
    </body>
</html>
