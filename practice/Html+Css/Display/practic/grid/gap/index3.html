<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
	    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <title>gap-properties</title>
		<link rel="stylesheet" href="style3.css"/>
    </head>
	<body>
	     <h1>Gap properties:</h1>
		 <p>Sets the spacing between the grid tracks(rows and columns).
		 Much cleaner than the using margins on the individual items</p>
		 <p><b>syntax:</b>gap:10px; for both rows and columns</p>
		 <h3>Example:</h3>
		 <div class="container">
		        <div class="card">card1</div>
			    <div class="card">card2</div>
			    <div class="card">card3</div>
			    <div class="card">card4</div>
		 </div>
	</body>
</html>
